<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>333 Metrics — Conversor de Planilhas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-neon:  #3BA540;
      --green-mid:   #34C759;
      --green-glow:  #66FFB1;
      --black:       #000000;
      --dark:        #1A1A1A;
      --dark2:       #111111;
      --card-bg:     rgba(18, 18, 18, 0.82);
      --border:      rgba(59, 165, 64, 0.25);
      --border-hover:rgba(52, 199, 89, 0.55);
      --text:        #FFFFFF;
      --text-muted:  #8A9A8A;
      --text-dim:    #4A5A4A;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      background: var(--black);
    }

    /* ── Animated gradient background ───────────────────────── */
    #gradient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      animation: bgEntrance 2s cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }

    @keyframes bgEntrance {
      from { opacity: 0; transform: scale(1.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Page layout ─────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    .page-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── Logo ────────────────────────────────────────────────── */
    .logo-wrap {
      margin-bottom: 10px;
    }

    .logo-wrap img {
      height: 220px;
      width: auto;
      max-width: 100%;
      filter: drop-shadow(0 0 18px rgba(102, 255, 177, 0.4));
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 540px;
      box-shadow:
        0 0 0 1px rgba(59,165,64,0.08),
        0 8px 40px rgba(0,0,0,0.7),
        0 0 60px rgba(59,165,64,0.06);
      backdrop-filter: blur(20px);
    }

    /* ── Platform selector ───────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .platform-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }

    .platform-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(59,165,64,0.06);
    }

    .platform-btn.active-tiktok {
      border-color: var(--green-mid);
      background: rgba(52, 199, 89, 0.1);
      color: var(--green-mid);
      box-shadow: 0 0 16px rgba(52,199,89,0.15);
    }

    .platform-btn.active-facebook {
      border-color: #1877F2;
      background: rgba(24, 119, 242, 0.1);
      color: #5BA4F5;
      box-shadow: 0 0 16px rgba(24,119,242,0.15);
    }

    .platform-icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Drop zone ───────────────────────────────────────────── */
    .drop-zone {
      border: 1.5px dashed rgba(59,165,64,0.3);
      border-radius: 12px;
      padding: 32px 24px 26px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(0,0,0,0.3);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--green-mid);
      background: rgba(52,199,89,0.05);
      box-shadow: 0 0 20px rgba(52,199,89,0.08);
    }

    .drop-zone.has-files {
      border-color: var(--green-neon);
      background: rgba(59,165,64,0.05);
      padding-bottom: 14px;
    }

    .drop-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .drop-label { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .drop-hint  { font-size: 12px; color: var(--text-dim); }

    #fileInput {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }

    /* file list inside drop zone */
    .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; text-align: left; }

    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(59,165,64,0.2);
      border-radius: 7px;
      padding: 7px 11px;
      font-size: 12px;
    }

    .file-item-name {
      color: var(--green-glow);
      font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 360px;
    }

    .file-item-remove {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 15px; padding: 0 2px;
      line-height: 1; flex-shrink: 0; transition: color 0.15s;
    }
    .file-item-remove:hover { color: #f85149; }

    .file-count { font-size: 11px; color: var(--text-dim); margin-top: 7px; text-align: center; }

    /* ── Date field ──────────────────────────────────────────── */
    .field { margin-top: 18px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-dim); margin-bottom: 8px;
      letter-spacing: 1.2px; text-transform: uppercase;
    }

    .date-input {
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .date-input:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(52,199,89,0.12); }
    .date-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

    /* ── Convert button ──────────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 20px; padding: 14px;
      background: linear-gradient(135deg, var(--green-neon), var(--green-mid));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(59,165,64,0.3);
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--green-mid), var(--green-glow));
      box-shadow: 0 4px 28px rgba(102,255,177,0.35);
      transform: translateY(-1px);
      color: #000;
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      background: rgba(59,165,64,0.2);
      color: var(--text-dim);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Status ──────────────────────────────────────────────── */
    .status {
      margin-top: 14px; padding: 11px 15px; border-radius: 8px;
      font-size: 13px; font-weight: 500; display: none;
      align-items: center; gap: 10px;
    }
    .status.error   { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: #f85149; display: flex; }
    .status.loading { background: rgba(59,165,64,0.08); border: 1px solid rgba(59,165,64,0.25); color: var(--green-mid); display: flex; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(52,199,89,0.25);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results panel ───────────────────────────────────────── */
    .results { display: none; flex-direction: column; }

    .results-header {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-dim); margin-bottom: 12px;
    }

    .result-item {
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 13px;
      margin-bottom: 8px; transition: border-color 0.2s;
    }
    .result-item:hover { border-color: rgba(52,199,89,0.4); }

    .result-item-top { display: flex; align-items: center; gap: 8px; }
    .result-item-orig {
      font-size: 11px; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
    }

    .btn-download {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--green-neon), var(--green-mid));
      color: #fff; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      width: 100%; justify-content: center;
      transition: all 0.15s;
      box-shadow: 0 2px 10px rgba(59,165,64,0.25);
    }
    .btn-download:hover { background: linear-gradient(135deg, var(--green-mid), var(--green-glow)); color: #000; }
    .btn-download.downloaded {
      background: rgba(59,165,64,0.15);
      color: var(--green-neon);
      box-shadow: none; cursor: default;
      border: 1px solid rgba(59,165,64,0.3);
    }

    .new-conversion {
      display: none; align-items: center; justify-content: center; gap: 6px;
      margin-top: 14px; font-size: 13px; color: var(--text-dim);
      cursor: pointer; transition: color 0.15s;
      background: none; border: none; width: 100%; padding: 6px;
      font-family: inherit;
    }
    .new-conversion:hover { color: var(--text-muted); }

    #uploadPanel.hidden { display: none; }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider {
      border: none; border-top: 1px solid rgba(59,165,64,0.12);
      margin: 0;
    }

    footer {
      position: relative; z-index: 1;
      margin-top: 24px; font-size: 11px;
      color: rgba(255,255,255,0.15); text-align: center;
    }
  </style>
</head>
<body>

  <!-- Animated gradient background -->
  <div id="gradient-bg"></div>

  <div class="page-content">
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="333.png" alt="333 Metrics" />
    </div>
    <p class="subtitle">Conversor de Planilhas · TikTok & Facebook Ads</p>

    <div class="card">

      <!-- UPLOAD PANEL -->
      <div id="uploadPanel">

        <div class="section-label">Plataforma</div>
        <div class="platform-selector">
          <button class="platform-btn active-tiktok" id="btnTikTok" data-platform="tiktok">
            <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
            </svg>
            TikTok Ads
          </button>
          <button class="platform-btn" id="btnFacebook" data-platform="facebook">
            <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook Ads
          </button>
        </div>

        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".xlsx,.xls" multiple />
          <span class="drop-icon">📊</span>
          <div class="drop-label">Arraste até 5 planilhas ou clique para selecionar</div>
          <div class="drop-hint">Aceita .xlsx exportados da plataforma selecionada</div>
          <div class="file-list" id="fileList"></div>
        </div>
        <div class="file-count" id="fileCount"></div>

        <div class="field">
          <label>Data do relatório</label>
          <input type="text" class="date-input" id="dateInput"
            placeholder="DD/MM/AAAA  (vazio = ontem)" maxlength="10" />
          <div class="date-hint" id="dateHint"></div>
        </div>

        <button class="btn" id="convertBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8a6 6 0 1 1 12 0A6 6 0 0 1 2 8z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="btnLabel">Converter</span>
        </button>

        <div class="status" id="status"></div>
      </div>

      <!-- RESULTS PANEL -->
      <div class="results" id="resultsPanel">
        <div class="results-header" id="resultsHeader">Planilha gerada</div>
        <div id="resultsList"></div>
        <button class="new-conversion" id="btnNewConversion">
          ↩ Nova conversão
        </button>
      </div>

    </div>

    <footer>333 Metrics · Conversor de Planilhas</footer>
  </div>

  <script>
    // ── Animated gradient background ─────────────────────────────
    (function initGradient() {
      const el = document.getElementById('gradient-bg');
      const colors  = ['#000000', '#071007', '#0E1F0E', '#3BA540', '#34C759', '#66FFB1', '#050F05'];
      const stops   = [30, 45, 58, 68, 78, 88, 100];
      const base    = 125;
      const range   = 6;
      const speed   = 0.018;
      let w = base, dir = 1;

      function frame() {
        if (w >= base + range) dir = -1;
        if (w <= base - range) dir =  1;
        w += dir * speed;
        const s = stops.map((p, i) => colors[i] + ' ' + p + '%').join(', ');
        el.style.background = 'radial-gradient(' + w + '% ' + w + '% at 50% 20%, ' + s + ')';
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();

    // ── App state ─────────────────────────────────────────────────
    const dropZone         = document.getElementById('dropZone');
    const fileInput        = document.getElementById('fileInput');
    const fileList         = document.getElementById('fileList');
    const fileCount        = document.getElementById('fileCount');
    const convertBtn       = document.getElementById('convertBtn');
    const btnLabel         = document.getElementById('btnLabel');
    const statusEl         = document.getElementById('status');
    const dateInput        = document.getElementById('dateInput');
    const dateHint         = document.getElementById('dateHint');
    const uploadPanel      = document.getElementById('uploadPanel');
    const resultsPanel     = document.getElementById('resultsPanel');
    const resultsList      = document.getElementById('resultsList');
    const resultsHeader    = document.getElementById('resultsHeader');
    const btnNewConversion = document.getElementById('btnNewConversion');
    const btnTikTok        = document.getElementById('btnTikTok');
    const btnFacebook      = document.getElementById('btnFacebook');

    let selectedFiles    = [];
    let convertedFile    = null;
    let selectedPlatform = 'tiktok';

    // ── Platform selector ─────────────────────────────────────────
    [btnTikTok, btnFacebook].forEach(function(btn) {
      btn.addEventListener('click', function() {
        selectedPlatform = btn.dataset.platform;
        btnTikTok.className   = 'platform-btn' + (selectedPlatform === 'tiktok'   ? ' active-tiktok'   : '');
        btnFacebook.className = 'platform-btn' + (selectedPlatform === 'facebook' ? ' active-facebook' : '');
      });
    });

    // ── Date hint & mask ──────────────────────────────────────────
    function getYesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    }
    dateHint.textContent = 'Padrão automático: ' + getYesterdayStr();

    dateInput.addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
      if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
      e.target.value = v.slice(0, 10);
    });

    // ── Drag & drop ───────────────────────────────────────────────
    dropZone.addEventListener('dragover',  function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', function()  { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(Array.from(e.dataTransfer.files));
    });
    fileInput.addEventListener('change', function() { addFiles(Array.from(fileInput.files)); fileInput.value = ''; });

    function addFiles(newFiles) {
      const valid = newFiles.filter(function(f) { return f.name.match(/\.xlsx?$/i); });
      if (newFiles.length !== valid.length) showStatus('error', 'Arquivo(s) inválido(s) ignorado(s) — só .xlsx aceito.');
      for (var i = 0; i < valid.length; i++) {
        if (selectedFiles.length >= 5) { showStatus('error', 'Limite de 5 arquivos atingido.'); break; }
        if (!selectedFiles.find(function(x) { return x.name === valid[i].name; })) selectedFiles.push(valid[i]);
      }
      renderFileList();
    }

    function removeFile(name) {
      selectedFiles = selectedFiles.filter(function(f) { return f.name !== name; });
      renderFileList();
      if (selectedFiles.length === 0) hideStatus();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      if (!selectedFiles.length) {
        dropZone.classList.remove('has-files');
        convertBtn.disabled = true;
        fileCount.textContent = '';
        btnLabel.textContent = 'Converter';
        return;
      }
      dropZone.classList.add('has-files');
      convertBtn.disabled = false;
      selectedFiles.forEach(function(f) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = '<span class="file-item-name" title="' + f.name + '">📄 ' + f.name + '</span>' +
          '<button class="file-item-remove" data-name="' + f.name + '">✕</button>';
        fileList.appendChild(item);
      });
      const n = selectedFiles.length;
      fileCount.textContent = n + ' arquivo' + (n > 1 ? 's' : '') + ' selecionado' + (n > 1 ? 's' : '');
      btnLabel.textContent  = n > 1 ? 'Converter ' + n + ' planilhas' : 'Converter';
    }

    fileList.addEventListener('click', function(e) {
      const btn = e.target.closest('.file-item-remove');
      if (btn) removeFile(btn.dataset.name);
    });

    // ── Convert ───────────────────────────────────────────────────
    convertBtn.addEventListener('click', async function() {
      if (!selectedFiles.length) return;
      convertBtn.disabled = true;
      const n = selectedFiles.length;
      showStatus('loading', 'Convertendo ' + n + ' planilha' + (n > 1 ? 's' : '') + '...');

      const formData = new FormData();
      selectedFiles.forEach(function(f) { formData.append('files', f); });
      formData.append('platform', selectedPlatform);
      if (dateInput.value.trim()) formData.append('date', dateInput.value.trim());

      try {
        const res  = await fetch('/convert', { method: 'POST', body: formData });
        const json = await res.json();

        if (!res.ok) { showStatus('error', json.error || 'Erro ao processar.'); convertBtn.disabled = false; return; }

        convertedFile = json;
        showResults();
      } catch (err) {
        showStatus('error', 'Erro de conexão com o servidor.');
        convertBtn.disabled = false;
      }
    });

    // ── Results ───────────────────────────────────────────────────
    function showResults() {
      uploadPanel.classList.add('hidden');
      resultsList.innerHTML = '';
      resultsHeader.textContent = '✓ Planilha gerada com sucesso';

      const item = document.createElement('div');
      item.className = 'result-item';

      const top = document.createElement('div');
      top.className = 'result-item-top';
      top.innerHTML = '<span style="font-size:15px">📄</span>' +
        '<span class="result-item-orig" title="' + convertedFile.name + '">' + convertedFile.name + '</span>';

      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn-download';
      dlBtn.id = 'btnDownload';
      dlBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 13 13" fill="none">' +
        '<path d="M6.5 1v7M3.5 5.5l3 3 3-3M1 10h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg> Baixar planilha';

      dlBtn.addEventListener('click', function() {
        triggerDownload(convertedFile, convertedFile.name);
        dlBtn.innerHTML = '✓ Baixado';
        dlBtn.classList.add('downloaded');
      });

      item.appendChild(top);
      item.appendChild(dlBtn);
      resultsList.appendChild(item);

      resultsPanel.style.display     = 'flex';
      btnNewConversion.style.display = 'flex';
    }

    function triggerDownload(file, filename) {
      const bytes = Uint8Array.from(atob(file.data), function(c) { return c.charCodeAt(0); });
      const blob  = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url   = URL.createObjectURL(blob);
      const a     = document.createElement('a');
      a.href = url; a.download = filename || file.name; a.click();
      URL.revokeObjectURL(url);
    }

    btnNewConversion.addEventListener('click', function() {
      selectedFiles = []; convertedFile = null;
      resultsPanel.style.display     = 'none';
      btnNewConversion.style.display = 'none';
      uploadPanel.classList.remove('hidden');
      renderFileList(); hideStatus();
      convertBtn.disabled = true;
    });

    // ── Status helpers ────────────────────────────────────────────
    function showStatus(type, msg) {
      statusEl.className = 'status ' + type;
      statusEl.innerHTML = type === 'loading'
        ? '<div class="spinner"></div><span>' + msg + '</span>' : msg;
    }
    function hideStatus() { statusEl.className = 'status'; statusEl.style.display = 'none'; }
  </script>
</body>
</html>
